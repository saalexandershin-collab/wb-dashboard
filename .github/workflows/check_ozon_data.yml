name: Диагностика Ozon данных

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install psycopg2-binary

      - name: Проверка Ozon постингов
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u - <<'EOF'
import psycopg2
import os

conn = psycopg2.connect(os.environ["DATABASE_URL"], connect_timeout=15)
cur = conn.cursor()

print("=== Ozon постинги по месяцам (все статусы) ===")
cur.execute("""
    SELECT
        DATE_TRUNC('month', created_at)::date as month,
        status,
        COUNT(*) as rows,
        COUNT(DISTINCT posting_number) as postings,
        SUM(quantity) as qty,
        ROUND(SUM(price * quantity)::numeric, 0) as oborot,
        ROUND(AVG(price)::numeric, 0) as avg_price,
        COUNT(CASE WHEN price IS NULL OR price = 0 THEN 1 END) as null_price
    FROM ozon_postings
    WHERE created_at >= '2026-01-01' AND created_at < '2026-05-01'
    GROUP BY 1, 2 ORDER BY 1, 2
""")
for r in cur.fetchall():
    print(f"  {r[0]} | {r[1]:<30} | rows={r[2]:>5} | postings={r[3]:>4} | qty={r[4]:>5} | оборот={r[5]:>12,} ₽ | avg={r[6]:>6} ₽ | null_price={r[7]}")

print()
print("=== Итого без отменённых ===")
cur.execute("""
    SELECT
        DATE_TRUNC('month', created_at)::date as month,
        COUNT(DISTINCT posting_number) as postings,
        SUM(quantity) as qty,
        ROUND(SUM(price * quantity)::numeric, 0) as oborot
    FROM ozon_postings
    WHERE created_at >= '2026-01-01' AND created_at < '2026-05-01'
      AND is_cancelled = false
    GROUP BY 1 ORDER BY 1
""")
total = 0
for r in cur.fetchall():
    total += r[3]
    print(f"  {r[0]}: postings={r[1]}, qty={r[2]}, оборот={r[3]:>12,} ₽")
print(f"  ИТОГО: {total:,} ₽")

print()
print("=== Итого С отменёнными ===")
cur.execute("""
    SELECT
        DATE_TRUNC('month', created_at)::date as month,
        COUNT(DISTINCT posting_number) as postings,
        SUM(quantity) as qty,
        ROUND(SUM(price * quantity)::numeric, 0) as oborot
    FROM ozon_postings
    WHERE created_at >= '2026-01-01' AND created_at < '2026-05-01'
    GROUP BY 1 ORDER BY 1
""")
total = 0
for r in cur.fetchall():
    total += r[3]
    print(f"  {r[0]}: postings={r[1]}, qty={r[2]}, оборот={r[3]:>12,} ₽")
print(f"  ИТОГО: {total:,} ₽")

print()
print("=== Транзакции Ozon (amount) ===")
cur.execute("""
    SELECT
        DATE_TRUNC('month', operation_date)::date as month,
        operation_type,
        COUNT(*) as cnt,
        ROUND(SUM(amount)::numeric, 0) as total_amount
    FROM ozon_transactions
    WHERE operation_date >= '2026-01-01' AND operation_date < '2026-05-01'
      AND operation_type ILIKE '%sale%'
    GROUP BY 1, 2 ORDER BY 1, 2
""")
rows = cur.fetchall()
if rows:
    for r in rows:
        print(f"  {r[0]} | {r[1]:<40} | cnt={r[2]:>5} | amount={r[3]:>12,} ₽")
else:
    print("  (нет продаж в транзакциях)")

print()
print("=== Топ-10 товаров по обороту ===")
cur.execute("""
    SELECT
        offer_id,
        product_name,
        SUM(quantity) as qty,
        ROUND(AVG(price)::numeric, 0) as avg_price,
        ROUND(SUM(price * quantity)::numeric, 0) as oborot
    FROM ozon_postings
    WHERE created_at >= '2026-01-01' AND created_at < '2026-05-01'
      AND is_cancelled = false AND price > 0
    GROUP BY 1, 2 ORDER BY 5 DESC LIMIT 10
""")
for r in cur.fetchall():
    print(f"  {r[0]:<20} | {r[1][:35]:<35} | qty={r[2]:>4} | avg={r[3]:>6} ₽ | оборот={r[4]:>10,} ₽")

conn.close()
EOF

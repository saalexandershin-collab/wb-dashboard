name: Ежедневная синхронизация WB

# Concurrency guard: только один запуск за раз, новый НЕ отменяет текущий.
# Это ключевая защита от двойных запросов к WB API.
concurrency:
  group: wb-sync
  cancel-in-progress: false

on:
  schedule:
    # 02:00 МСК = 23:00 UTC (МСК = UTC+3)
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Год (пусто = текущий)"
        required: false
        default: ""
      month:
        description: "Месяц 1-12 (пусто = текущий)"
        required: false
        default: ""
      mode:
        description: "Режим: orders | finances"
        required: false
        default: "orders"

jobs:
  sync-wb:
    name: "WB синхронизация (1 запрос)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: Синхронизировать
        env:
          WB_API_TOKEN:     ${{ secrets.WB_API_TOKEN }}
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          SYNC_YEAR:        ${{ github.event.inputs.year }}
          SYNC_MONTH:       ${{ github.event.inputs.month }}
          SYNC_MODE:        ${{ github.event.inputs.mode || 'orders' }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/sync_wb_unified.py

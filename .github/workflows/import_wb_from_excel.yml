name: Импорт WB финансов из Excel

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Установить Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Загрузить данные в БД
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/import_wb_from_excel.py

name: Keepalive (против задержек GitHub Actions)

# GitHub депrioritizes scheduled workflows на репо без активности.
# Этот воркфлоу делает пустой коммит раз в неделю — достаточно чтобы
# GitHub считал репо активным и не задерживал основной синк на 4-8 часов.

on:
  schedule:
    - cron: "30 2 * * 1"  # каждый понедельник 05:30 МСК (за 30 мин до синка)
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > .keepalive
          git add .keepalive
          git diff --cached --quiet || git commit -m "chore: keepalive $(date -u '+%Y-%m-%d')"
          git push

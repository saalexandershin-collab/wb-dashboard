name: WB Ежедневный мастер-синк

# Заказы + выкупы + финансы последовательно.
# Три cron-триггера: если GitHub задержит один — сработает следующий.
# concurrency гарантирует что одновременно идёт только одна копия.

concurrency:
  group: wb-master-sync
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 3 * * *"   # 06:00 МСК (основной)
    - cron: "0 6 * * *"   # 09:00 МСК (резервный, если первый задержался)
    - cron: "0 10 * * *"  # 13:00 МСК (страховочный)
  workflow_dispatch:

jobs:
  sync-orders:
    name: "1. Заказы WB"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: Синхронизировать заказы
        env:
          WB_API_TOKEN:     ${{ secrets.WB_API_TOKEN }}
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          SYNC_MODE:        "orders"
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/sync_wb_unified.py

  sync-sales:
    name: "2. Выкупы WB"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: sync-orders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: Синхронизировать выкупы
        env:
          WB_API_TOKEN:     ${{ secrets.WB_API_TOKEN }}
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          SYNC_MODE:        "sales"
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/sync_wb_unified.py

  sync-finances:
    name: "3. Финансовый отчёт WB"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: sync-sales
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: Синхронизировать финансы
        env:
          WB_API_TOKEN:     ${{ secrets.WB_API_TOKEN }}
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          SYNC_MODE:        "finances"
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/sync_wb_unified.py

  sync-stocks:
    name: "4. Склады WB"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: sync-finances
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: Синхронизировать склады
        env:
          WB_API_TOKEN:     ${{ secrets.WB_API_TOKEN }}
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/sync_stocks.py

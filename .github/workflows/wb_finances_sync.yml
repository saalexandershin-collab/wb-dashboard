name: Финансовый отчёт WB

on:
  schedule:
    # 04:00 МСК = 01:00 UTC (МСК = UTC+3, летнего времени нет)
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Год (например 2026)"
        required: false
        default: ""
      months:
        description: "Месяцы через запятую (например: 1,2,3)"
        required: false
        default: ""
      inter_month_delay:
        description: "Пауза между месяцами в секундах (900 = 15 мин)"
        required: false
        default: "900"

jobs:
  sync:
    runs-on: ubuntu-latest
    # Увеличиваем timeout для длинных исторических синков
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Установить Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Синхронизировать финансовый отчёт WB
        env:
          WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_YEAR: ${{ github.event.inputs.year }}
          SYNC_MONTHS: ${{ github.event.inputs.months }}
          INTER_MONTH_DELAY: ${{ github.event.inputs.inter_month_delay }}
        run: |
          YEAR="${SYNC_YEAR:-$(date +%Y)}"
          # Если months не задан — берём текущий месяц
          MONTHS="${SYNC_MONTHS:-$(date +%-m)}"
          DELAY="${INTER_MONTH_DELAY:-0}"
          echo "Год: $YEAR | Месяцы: $MONTHS | Пауза между месяцами: ${DELAY}с"
          SYNC_YEAR="$YEAR" SYNC_MONTHS="$MONTHS" INTER_MONTH_DELAY="$DELAY" \
            python scripts/sync_finances.py

name: Финансовый отчёт WB

on:
  schedule:
    # 04:00 МСК = 01:00 UTC (МСК = UTC+3, летнего времени нет)
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Год (например 2026)"
        required: false
        default: ""
      month:
        description: "Месяц (1-12). Можно несколько через запятую: 4,5"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установить Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Синхронизировать финансовый отчёт WB
        env:
          WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_YEAR: ${{ github.event.inputs.year }}
          SYNC_MONTH: ${{ github.event.inputs.month }}
        run: |
          YEAR="${SYNC_YEAR:-$(date +%Y)}"
          MONTH="${SYNC_MONTH:-$(date +%-m)}"
          SYNC_YEAR="$YEAR" SYNC_MONTH="$MONTH" python scripts/sync_finances.py

name: "Исторический импорт WB (bulk)"

"on":
  workflow_dispatch:
    inputs:
      year_from:
        description: "Год начала"
        required: false
        default: "2025"
      month_from:
        description: "Месяц начала (1-12)"
        required: false
        default: "7"
      year_to:
        description: "Год конца"
        required: false
        default: "2026"
      month_to:
        description: "Месяц конца (1-12)"
        required: false
        default: "3"

concurrency:
  group: wb-sync
  cancel-in-progress: false

jobs:
  historical-sync:
    name: "Исторический импорт (помесячно)"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: Загрузить историю заказов
        env:
          WB_API_TOKEN:  ${{ secrets.WB_API_TOKEN }}
          DATABASE_URL:  ${{ secrets.DATABASE_URL }}
          YEAR_FROM:     ${{ github.event.inputs.year_from }}
          MONTH_FROM:    ${{ github.event.inputs.month_from }}
          YEAR_TO:       ${{ github.event.inputs.year_to }}
          MONTH_TO:      ${{ github.event.inputs.month_to }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/sync_wb_historical.py
